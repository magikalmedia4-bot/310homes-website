<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You | 3X Stays</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--navy:#0d1b2a;--gold:#c9a84c;--cream:#f5f0e8;--cream-dim:#ddd8ce;--white:#ffffff;--text-muted:#8a9bb0;--border:rgba(201,168,76,0.2);}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--navy);color:var(--cream);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;}
.logo{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:700;color:var(--gold);margin-bottom:3rem;text-decoration:none;}
.logo span{color:var(--cream);}
.icon{font-size:4rem;margin-bottom:1.5rem;}
h1{font-family:'Cormorant Garamond',serif;font-size:2.5rem;color:var(--white);margin-bottom:1rem;}
h1 em{color:var(--gold);font-style:normal;}
p{color:var(--cream-dim);font-size:1rem;line-height:1.8;max-width:480px;margin-bottom:1rem;}
.divider{width:48px;height:2px;background:var(--gold);margin:1.5rem auto;}
.contact-box{border:1px solid var(--border);padding:1.5rem 2rem;margin-top:2rem;max-width:400px;}
.contact-box p{font-size:0.85rem;color:var(--text-muted);margin-bottom:0.5rem;}
.contact-box a{color:var(--gold);text-decoration:none;font-size:0.95rem;}
.btn{display:inline-block;background:var(--gold);color:var(--navy);padding:0.9rem 2rem;font-family:'DM Sans',sans-serif;font-size:0.9rem;font-weight:500;letter-spacing:0.05em;text-transform:uppercase;text-decoration:none;margin-top:2rem;}
</style>
</head>
<body>
<a href="/" class="logo">3X<span>Stays</span></a>
<div class="icon">✦</div>
<h1>Enquiry <em>Received</em></h1>
<div class="divider"></div>
<p>Thank you for reaching out. We'll come back to you within 2 hours with availability, pricing, and a tailored proposal.</p>
<p>For urgent enquiries, WhatsApp is fastest.</p>
<div class="contact-box">
  <p>Need us sooner?</p>
  <a href="https://wa.me/447424960818">WhatsApp us directly →</a>
</div>
<a href="/" class="btn">Back to Home</a>
</body>
</html>
